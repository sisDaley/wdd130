<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="White Water Rafting Site Contact Us Page">
    <meta name="author" content="Xavier">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us | White Water Rafting Company</title>
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="White Water Rafting logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero">
            <img src="images/contact-hero.jpg" alt="white water rafting image">
            <h1>Contact Us</h1>
        </div>

        <div class="contact">
            <aside>
                <h2>Address</h2>
                <p>Ruta 231 KM 45</p>
                <p>Lagos, Chile</p>
                <h2>Phone/Email</h2>
                <p>Phone: 800.333.4444</p>
                <p>contact@rapidscompany.com</p>
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2719.6586378256184!2d-71.8728770281193!3d-43.187463636752106!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x961dddac6c6c0a65%3A0xe71cc8aac70b867d!2sCamping%20Los%20Coihues!5e1!3m2!1sen!2sus!4v1677244625123!5m2!1sen!2sus"
                    width="400" height="300" style="border:0; margin-top: 2rem;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </aside>
            <section>
                <h2>SEND A MESSAGE</h2>
                <form>
                    <fieldset>
                      
                        <label for="fname">Full Name</label>
                        <input type="text" id="fullname" name="fullname">
                        <label for="email">Email</label>
                        <input type="email" id="useremail" name="useremail">
                    </fieldset>
                    <fieldset>
                        <legend>How Can We Help?</legend>
                        <div>
                          <input type="radio" id="general" name="purpose" value="general"
                                 checked>
                          <label for="general">General Inquiry</label>
                        </div>
                    
                        <div>
                          <input type="radio" id="reservation" name="purpose" value="reservation">
                          <label for="reservation">Reservation Information</label>
                        </div>
                    
                        <div>
                          <input type="radio" id="website" name="purpose" value="website">
                          <label for="website">Website Suggestion</label>
                        </div>
                    </fieldset>
                    <fieldset>
                        <label for="message">Message</label>
                        <textarea id="message" placeholder="Write your message here"></textarea>
                    </fieldset>
                
                    <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                    <label for="newsletter">Subscribe to our newsletter</label>
                    <button type="submit">Submit</button>
                </form>
            </section>
            <section class="contact-employees">
                <h2>MEET OUR GUIDES</h2>
                <div>
                    <figure>
                        <img src="images/guide1.jpg" alt="guide Ana">
                        <figcaption>Ana takes Corporate Groups on tours.</figcaption>
                    </figure>
                    <figure>
                        <img src="images/guide2.jpg" alt="guide George">
                        <figcaption>George is our Day Trip guide.</figcaption>
                    </figure>
                    <figure>
                        <img src="images/guide3.jpg" alt="guide Beth">
                        <figcaption>Beth guides Families and Reunions.</figcaption>
                    </figure>
                </div>
            </section>
        </div>

    </main>
    <footer>
        <p>© 2023 ⚓️ White Water Rafting ⚓️ Xavier</p>
        <div>
            <a href="https://facebook.com"><img src="images/facebook.png" alt="facebook"></a>
            <a href="https://twitter.com"><img src="images/twitter.png" alt="twitter"></a>
            <a href="https://youtube.com"><img src="images/youtube.png" alt="Youtube"></a>
        </div>
    </footer>

</body>

</html>
